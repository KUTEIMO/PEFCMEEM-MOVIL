name: pefcmeem
description: "EULER — Domina las matemáticas. Plataforma educativa para Educación Media (9–11)."
publish_to: "none"

version: 2.0.0+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.10
  flutter_markdown: ^0.7.7+1
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  firebase_core_platform_interface: ^6.0.3

# Solo splash Flutter (AppSplashScreen). Sin splash nativo generado.
flutter_native_splash:
  color: "#0A2B35"
  android: false
  ios: false
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/courses.json
    - assets/branding/euler_splash.svg
    - assets/branding/euler_mark.svg
    - assets/branding/euler_logo_stand.svg
    - assets/branding/euler_logo_lockup.svg
    - assets/docs/documento_pefcmeem.md
